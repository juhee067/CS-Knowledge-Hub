name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          # 빌드 타임에 클라이언트 번들로 들어가는 공개 값(placeholder).
          # 실제 값은 Vercel 환경변수로 주입된다.
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
